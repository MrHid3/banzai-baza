spring:
  application:
    name: backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url:
    username:
    password:

  flyway:
    enabled: true
    locations: classpath:/db/migration
    baseline-on-migrate: false   # safe if DB already has tables

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  #      ddl-auto: create
#      ddl-auto: update
  mail:
    host:
    port: 2525
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret:
  expiration: 900000
  refresh-expiration: 2592000000

backend:
  admin-email:
  admin-password:

app:
  frontend-url: http://localhost:3000
  magic-link:
    expiry-hours: 24

logging:
    level:
        root: INFO