services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8080
    restart: unless-stopped
    environment:
      BACKEND_URL: ${ORIGIN}
      ORIGIN: ${ORIGIN}          # required by SvelteKit node adapter, e.g. https://yourdomain.com
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs/baza-key.pem:/etc/nginx/certs/baza-key.pem
      - ./nginx/certs/baza-cer.pem:/etc/nginx/certs/baza-cer.pem
    depends_on:
      - frontend
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge